spring.application.name=order_system_test

# ── MongoDB ──────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/order_db}

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ── Conductor (local Docker: http://localhost:8085  |  in-container: http://conductor:8080/api)
conductor.server.url=${CONDUCTOR_SERVER_URL:http://localhost:8085/api}

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.mdl.order_system_test=DEBUG
logging.level.com.netflix.conductor=INFO
