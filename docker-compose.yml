services:

  # ── 1. Database ─────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: order-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: order_db
    volumes:
      - mongo_data:/data/db
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. Redis (human task queue cache) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: order-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - order-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── 3. Conductor (local, no auth required) ──────────────────────────────────
  conductor:
    image: orkesio/orkes-conductor-community:latest
    container_name: order-conductor
    restart: unless-stopped
    ports:
      - "8085:8080"   # UI + API → http://localhost:8085
    networks:
      - order-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ── 4. Spring Boot Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:secret@mongodb:27017/order_db?authSource=admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      CONDUCTOR_SERVER_URL: http://host.docker.internal:8081/api
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - order-net
    extra_hosts:
        - "host.docker.internal:host-gateway"
  # ── 5. React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: order-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - order-net

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

networks:
  order-net:
    driver: bridge
